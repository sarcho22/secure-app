<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <h2 class="title">Login</h2>

        <form id="loginForm" class="form">
            <input class="input" type="text" id="username" placeholder="Username" required>
            <input class="input" type="password" id="password" placeholder="Password" required>
            <button class="btn" type="submit">Login</button>
        </form>

        <p id="error" class="message"></p>

        <p class="link-text">
            Don't have an account?
            <a href="/register-page">Register</a>
        </p>

        <p class="link-text">
            Forgot your password?
            <a href="/forgot-password-page">Reset Password</a>
        </p>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
