<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="admin-container">
        <div class="top-bar">
            <h1 class="title">Admin Dashboard</h1>
            <button class="btn logout-btn" id="adminLogoutBtn">Logout</button>
        </div>

        <p class="subtitle">Manage users, review documents, and inspect security logs.</p>

        <div id="message" class="message"></div>

        <div class="admin-section">
            <h2>Users</h2>
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Role</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody"></tbody>
            </table>
        </div>

        <div class="admin-section">
            <h2>Documents</h2>
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Owner</th>
                        <th>Visibility</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="documentsTableBody"></tbody>
            </table>

            <p class="link-text">
                <button class="btn" id="viewLogsBtn">View Security Logs</button>
            </p>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
