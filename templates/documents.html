<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documents</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <div class="topbar">
            <h1>Documents</h1>
            <div class="actions">
                <a class="nav-link" href="/dashboard">Back to Dashboard</a>
                <button type="button" class="secondary" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="section">
            <h2>Upload Document</h2>
            <form id="uploadForm">
                <input type="text" id="filename" placeholder="Filename" required>
                <textarea id="content" placeholder="Document content"></textarea>
                <button type="submit">Upload</button>
            </form>
            <p id="uploadMessage" class="message"></p>
        </div>

        <div class="section">
            <h2>Your Documents</h2>
            <div id="docList" class="document-grid"></div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
